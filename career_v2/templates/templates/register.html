<!-- Prompt: Create a student registration form with fields for full name, email,
     college name, degree dropdown, year of study dropdown, password and confirm
     password with validation for required fields and password match check. -->
{% extends "base.html" %}
{% block title %}Register – CareerAI{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card p-4 fu">
        <div class="text-center mb-4">
          <div class="mx-auto mb-3" style="width:64px;height:64px;border-radius:18px;background:rgba(79,70,229,.1);display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-person-plus" style="font-size:2rem;color:var(--primary);"></i>
          </div>
          <h3 style="font-weight:800;">Create Account</h3>
          <p style="color:var(--muted);font-size:.9rem;">Start your career journey — completely free!</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control form-control-lg" placeholder="Your full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="you@email.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">College Name</label>
            <input type="text" name="college" class="form-control" placeholder="Your college name">
          </div>
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">Degree</label>
              <select name="degree" class="form-select">
                <option>B.Tech / B.E</option><option>BCA</option>
                <option>B.Sc Computer Science</option><option>MCA</option>
                <option>M.Tech</option><option>MBA</option>
                <option>B.Com</option><option>Other</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Year</label>
              <select name="year" class="form-select">
                <option>1st Year</option><option>2nd Year</option>
                <option>3rd Year</option><option>4th Year</option>
                <option>Fresher / Graduate</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Min 6 characters" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Repeat password" required>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-main btn-lg">
              <i class="bi bi-check2-circle me-2"></i>Create Account
            </button>
            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary rounded-3">Already have account? Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
