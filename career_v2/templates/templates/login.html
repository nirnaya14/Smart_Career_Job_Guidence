<!-- Prompt: Create a login page with email and password fields, login button
     and a link to register page. Show error messages for wrong credentials
     using Flask flash messages. -->
{% extends "base.html" %}
{% block title %}Login – CareerAI{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-4">
      <div class="card p-4 fu">
        <div class="text-center mb-4">
          <div class="mx-auto mb-3" style="width:64px;height:64px;border-radius:18px;background:rgba(79,70,229,.1);display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-person-circle" style="font-size:2rem;color:var(--primary);"></i>
          </div>
          <h3 style="font-weight:800;">Welcome Back!</h3>
          <p style="color:var(--muted);font-size:.9rem;">Login to find your dream job</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="you@email.com" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Your password" required>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-main btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
            <a href="{{ url_for('register') }}" class="btn btn-outline-secondary rounded-3">New user? Register Free</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
